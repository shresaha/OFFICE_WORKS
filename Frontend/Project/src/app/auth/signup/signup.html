<div class="auth-wrapper">
  <h2>Create your account</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

    <div class="form-field" [class.invalid]="f.name.touched && f.name.invalid">

      <div class="label-row">
        <span class="label-icon">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-4.418 0-8 2.239-8 5v1h16v-1c0-2.761-3.582-5-8-5z"
              fill="none" stroke="currentColor" stroke-width="1.5" />
          </svg>
        </span>

        <label for="name">Name</label>
      </div>

      <input id="name" type="text" formControlName="name" placeholder="Enter your name" />

      <div class="error" *ngIf="f.name.touched && f.name.errors">
        <span *ngIf="f.name.errors['required']">
          <span class="required">*</span>Name is required.
        </span>
        <span *ngIf="f.name.errors['minlength']">
          <span class="required">*</span>Name must be at least 2 characters.
        </span>
      </div>
    </div>

 
    <div class="form-field" [class.invalid]="f.email.touched && f.email.invalid">

      <div class="label-row">
        <span class="label-icon">
           <svg width="18" height="18" viewBox="0 0 24 24">
            <rect x="3" y="6" width="18" height="12" rx="2"
                  fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 6l9 6 9-6"
                  fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </span>
        <label for="email">Email</label>
      </div>

      <input id="email" type="email" formControlName="email" placeholder="Enter your email id" />

      <div class="error" *ngIf="f.email.touched && f.email.errors">
        <span *ngIf="f.email.errors['required']">
          <span class="required">*</span>Email is required.
        </span>
        <span *ngIf="f.email.errors['email']">
          <span class="required">*</span>Enter a valid email address.
        </span>
      </div>

      <div class="error server-error" *ngIf="serverError">
        {{ serverError }}
      </div>

    </div>

    <div class="form-field password-field" [class.invalid]="f.password.touched && f.password.invalid">

      <div class="label-row">
        <span class="label-icon">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M12 1a5 5 0 00-5 5v3H5v14h14V9h-2V6a5 5 0 00-5-5z" fill="none" stroke="currentColor"
              stroke-width="1.5" />
          </svg>
        </span>

        <label for="password">Password</label>
      </div>

      <div class="password-wrapper">

        <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
          placeholder="Enter your password" />

        <button type="button" class="eye-btn" (click)="togglePassword()">

          <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" class="eye-icon">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12zm11 4a4 4 0 100-8 4 4 0 000 8z" stroke="currentColor"
              stroke-width="1.5" fill="none" />
          </svg>

          <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" class="eye-icon">
            <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" />
            <path d="M2.25 12s3.75-6.75 9.75-6.75 9.75 6.75 9.75 6.75-3.75 6.75-9.75 6.75S2.25 12 2.25 12z"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <path d="M10 10a3 3 0 013.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" fill="none" />
          </svg>

        </button>
      </div>

      <div class="error" *ngIf="f.password.touched && f.password.errors">
        <span *ngIf="f.password.errors['required']">
          <span class="required">*</span>Password is required.
        </span>
        <span *ngIf="f.password.errors['minlength']">
          <span class="required">*</span>Password must be at least 8 characters.
        </span>
      </div>
    </div>


    <button class="primary" type="submit" [disabled]="submitting">
      {{ submitting ? 'Creating...' : 'Create account' }}
    </button>

    <p class="switch">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </form>

</div>
