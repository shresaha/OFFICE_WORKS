<div class="auth-wrapper">
  <h2>Welcome back</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

    <div
      class="form-field"
      [class.invalid]="form.controls.email.touched && form.controls.email.invalid"
    >
      <div class="label-row">
        <span class="label-icon">
          <!-- email icon svg -->
           <svg width="18" height="18" viewBox="0 0 24 24">
            <rect
              x="3"
              y="6"
              width="18"
              height="12"
              rx="2"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M3 6l9 6 9-6"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            />
          </svg>
        </span>
        <label>Email</label>
      </div>

      <input
        type="email"
        formControlName="email"
        placeholder="Enter your email"
        autocomplete="email"
        (input)="serverError = null"
      />

      <div
        class="error"
        *ngIf="form.controls.email.touched && form.controls.email.errors"
      >
        <span *ngIf="form.controls.email.errors['required']">
          <span class="required">*</span>Email is required.
        </span>
        <span *ngIf="form.controls.email.errors['email']">
          <span class="required">*</span>Please enter a valid email address.
        </span>
      </div>
    </div>

    <div
      class="form-field password-field"
      [class.invalid]="form.controls.password.touched && form.controls.password.invalid"
    >
      <div class="label-row">
        <span class="label-icon">
          <!-- lock icon svg -->
           <svg width="18" height="18" viewBox="0 0 24 24">
            <path
              d="M12 1a5 5 0 00-5 5v3H5v14h14V9h-2V6a5 5 0 00-5-5z"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            />
          </svg>
        </span>
        <label>Password</label>
      </div>

      <div class="password-wrapper">
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />

        <button
          type="button"
          class="eye-btn"
          (click)="togglePassword()"
          aria-label="Toggle password visibility"
        >
          <!-- eye icons -->
           <svg
            *ngIf="!showPassword"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            class="eye-icon"
          >
            <path
              d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12zm11 4a4 4 0 100-8 4 4 0 000 8z"
              stroke="currentColor"
              stroke-width="1.5"
              fill="none"
            />
          </svg>

          <svg
            *ngIf="showPassword"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            class="eye-icon"
          >
            <path
              d="M3 3l18 18"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              fill="none"
            />
            <path
              d="M2.25 12s3.75-6.75 9.75-6.75 9.75 6.75 9.75 6.75-3.75 6.75-9.75 6.75S2.25 12 2.25 12z"
              stroke="currentColor"
              stroke-width="1.5"
              fill="none"
            />
          </svg>
        </button>
      </div>

      <div
        class="error"
        *ngIf="form.controls.password.touched && form.controls.password.errors"
      >
        <span *ngIf="form.controls.password.errors['required']">
          <span class="required">*</span>Password is required.
        </span>
      </div>
    </div>

    <div class="server-error" *ngIf="serverError">
      {{ serverError }}
    </div>

    <button class="primary" type="submit" [disabled]="submitting">
      {{ submitting ? 'Logging in...' : 'Login' }}
    </button>

    <p class="switch">
      Don’t have an account?
      <a routerLink="/signup">Signup</a>
    </p>

  </form>
</div>
